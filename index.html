<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura Musical - Notas no Pentagrama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pentagrama-line { stroke: #475569; stroke-width: 2; }
        .note-circle { transition: all 0.2s ease; cursor: pointer; touch-action: manipulation; }
        .note-circle:active { transform: scale(1.5); }
        .btn-note { transition: all 0.2s ease; touch-action: manipulation; }
        .btn-note:active { transform: scale(0.95); }
        
        /* Ensure the SVG scales gracefully */
        .svg-container { width: 100%; height: auto; max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen p-3 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-5xl font-extrabold text-indigo-900 mb-2">🎵 Aventura Musical! 🎶</h1>
            <p class="text-indigo-600 text-lg">Toque ou clique para aprender!</p>
        </header>

        <div class="flex flex-col gap-6">
            <!-- Pentagrama Interativo -->
            <div class="bg-white p-4 md:p-6 rounded-3xl shadow-xl border-4 border-indigo-100">
                <h2 class="text-xl font-bold text-indigo-800 mb-4 text-center" id="pentagram-title">Clave de Sol</h2>
                <div class="svg-container">
                    <svg viewBox="0 0 800 300" preserveAspectRatio="xMidYMid meet" class="w-full">
                        <!-- Linhas -->
                        <line x1="50" y1="100" x2="750" y2="100" class="pentagrama-line" />
                        <line x1="50" y1="130" x2="750" y2="130" class="pentagrama-line" />
                        <line x1="50" y1="160" x2="750" y2="160" class="pentagrama-line" />
                        <line x1="50" y1="190" x2="750" y2="190" class="pentagrama-line" />
                        <line x1="50" y1="220" x2="750" y2="220" class="pentagrama-line" />
                        
                        <!-- Notas -->
                        <circle id="visual-do" cx="150" cy="250" r="20" fill="#ef4444" class="note-circle" />
                        <circle id="visual-re" cx="250" cy="235" r="20" fill="#f97316" class="note-circle" />
                        <circle id="visual-mi" cx="350" cy="220" r="20" fill="#eab308" class="note-circle" />
                    </svg>
                </div>
                <div id="feedback" class="mt-4 text-center text-lg font-bold text-indigo-700 bg-indigo-100 p-3 rounded-full min-h-[3rem] flex items-center justify-center">
                    Toque em uma nota abaixo!
                </div>
            </div>

            <!-- Painel de Controle (10 Botões) -->
            <div class="bg-indigo-900 p-5 rounded-3xl text-white shadow-xl">
                <h3 class="text-lg font-bold mb-4 text-center">Notas Musicais:</h3>
                <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
                    <button class="btn-note bg-red-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Dó')">Dó</button>
                    <button class="btn-note bg-orange-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Ré')">Ré</button>
                    <button class="btn-note bg-yellow-500 p-4 rounded-xl text-indigo-900 font-bold text-lg" onclick="playNote('Mi')">Mi</button>
                    <button class="btn-note bg-green-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Fá')">Fá</button>
                    <button class="btn-note bg-blue-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Sol')">Sol</button>
                    <button class="btn-note bg-indigo-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Lá')">Lá</button>
                    <button class="btn-note bg-purple-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Si')">Si</button>
                    <button class="btn-note bg-pink-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Dó Agudo')">Dó+</button>
                    <button class="btn-note bg-teal-500 p-4 rounded-xl font-bold text-lg" onclick="playNote('Ré Agudo')">Ré+</button>
                    <button class="btn-note bg-rose-500 p-4 rounded-xl font-bold text-lg" onclick="toggleClef()">Clave</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentClef = 'Sol';

        function playNote(note) {
            const feedback = document.getElementById('feedback');
            feedback.innerText = `🎵 Você tocou: ${note}!`;
            
            // Efeito visual de pulo no feedback
            feedback.classList.add('animate-pulse');
            setTimeout(() => feedback.classList.remove('animate-pulse'), 500);
            
            console.log("Nota: " + note);
        }

        function toggleClef() {
            currentClef = currentClef === 'Sol' ? 'Fá' : 'Sol';
            document.getElementById('pentagram-title').innerText = `Clave de ${currentClef}`;
            
            // Feedback sem usar alert()
            const feedback = document.getElementById('feedback');
            feedback.innerText = `Mudando para Clave de ${currentClef}!`;
            feedback.classList.add('bg-yellow-200');
            setTimeout(() => feedback.classList.remove('bg-yellow-200'), 1000);
        }
    </script>
</body>
</html>
